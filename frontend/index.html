<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen AI Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .navbar { background-color: #1e293b; }
        .store-banner { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 60px 0; margin-bottom: 40px; }
        .product-card { transition: transform 0.2s, box-shadow 0.2s; border: none; border-radius: 12px; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#"> Shadow Store</a>
        <div class="d-flex text-white align-items-center">
            <span id="cart-badge" class="badge bg-danger rounded-pill px-3 py-2">Cart: 0 Items</span>
        </div>
    </div>
</nav>

<div class="store-banner text-center shadow-sm">
    <div class="container">
        <h1 class="display-4 fw-bold">Explore The Tech Catalog</h1>
        <p class="lead text-muted-light">Powered by a real-time Python Machine Learning Recommendation Engine</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row" id="catalog-container">
    </div>
</div>

<script>
    // --- CART MEMORY LOGIC ---
    // Check if a cart exists in memory, otherwise start at 0
    let cartCount = localStorage.getItem('cartCount') ? parseInt(localStorage.getItem('cartCount')) : 0;
    document.getElementById('cart-badge').innerText = `Cart: ${cartCount} Items`;

    // --- FETCH CATALOG LOGIC ---
    fetch('https://ecommerce-java-backend-rpzg.onrender.com/api/store/products')
        .then(response => response.json())
        .then(products => {
            const catalogContainer = document.getElementById('catalog-container');

            products.forEach(product => {
                const productHTML = `
                    <div class="col-md-4 mb-4">
                        <div class="card product-card h-100 shadow-sm d-flex flex-column justify-content-between">
                            <div class="card-body p-4">
                                <span class="text-muted small fw-bold text-uppercase">${product.category}</span>
                                <h4 class="card-title mt-1 fw-bold">${product.name}</h4>
                                <p class="card-text text-muted">${product.description}</p>
                            </div>
                            <div class="card-footer bg-white border-0 p-4 pt-0 d-flex justify-content-between align-items-center">
                                <span class="h5 text-success fw-bold m-0">₹${product.price}</span>
                                <a href="product.html?id=${product.productId}" class="btn btn-dark px-3">View Details</a>
                            </div>
                        </div>
                    </div>
                `;
                catalogContainer.innerHTML += productHTML;
            });
        })
        .catch(error => console.error("Error loading product catalog:", error));
</script>

</body>
</html>
