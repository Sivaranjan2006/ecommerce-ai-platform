<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - AI Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 20px; }
        .hero-product { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .recommendation-card { transition: transform 0.2s; }
        .recommendation-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); cursor: pointer; }
    </style>
</head>
<body>

<div class="container">

    <div class="row mt-4 mb-3">
        <div class="col-12">
            <a href="index.html" class="btn btn-outline-secondary btn-sm">
                &larr; Back to Store
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 hero-product text-center">
            <span class="badge bg-primary mb-2">Currently Viewing</span>
            <span id="main-product-category" class="badge bg-secondary mb-2"></span>

            <h1 id="main-product-title">Loading Product...</h1>
            <p id="main-product-desc" class="text-muted lead">Please wait while we fetch the details.</p>
            <h2 id="main-product-price" class="text-success fw-bold"></h2>
            <button onclick="addToCart()" class="btn btn-dark btn-lg mt-3">Add to Cart</button>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col-12 text-center mb-4">
            <h3 class="fw-light">✨ Recommended by our AI Engine ✨</h3>
        </div>
    </div>

    <div class="row justify-content-center" id="recommendations-container">
    </div>
</div>

<script>
    // --- CART MEMORY LOGIC ---
    let cartCount = localStorage.getItem('cartCount') ? parseInt(localStorage.getItem('cartCount')) : 0;

    function addToCart() {
        cartCount++; // Increment the number
        localStorage.setItem('cartCount', cartCount); // Save it to the browser memory

        // Change button text temporarily to show it worked!
        const btn = document.querySelector('button.btn-dark');
        btn.innerText = "Added!";
        btn.classList.replace('btn-dark', 'btn-success');
        setTimeout(() => {
            btn.innerText = "Add to Cart";
            btn.classList.replace('btn-success', 'btn-dark');
        }, 1500);
    }

    // --- FETCH PRODUCT LOGIC ---
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id') || 101;

    fetch('https://ecommerce-java-backend-rpzg.onrender.com/api/store/products/' + productId)
        .then(response => response.json())
        .then(data => {

            const mainProduct = data.viewing_product;
            document.getElementById('main-product-title').innerText = mainProduct.name;
            document.getElementById('main-product-desc').innerText = mainProduct.description;

            // CHANGED TO RUPEE SYMBOL HERE
            document.getElementById('main-product-price').innerText = `₹${mainProduct.price}`;
            document.getElementById('main-product-category').innerText = mainProduct.category;

            const recContainer = document.getElementById('recommendations-container');
            const recommendations = data.recommended_for_you;

            if (Array.isArray(recommendations) && recommendations.length > 0) {

                fetch('https://ecommerce-java-backend-rpzg.onrender.com/api/store/products')
                    .then(res => res.json())
                    .then(allProducts => {

                        recommendations.forEach(recItem => {
                            const actualId = recItem.product_id || recItem.id || recItem;
                            const fullProduct = allProducts.find(p => p.productId === actualId);

                            if (fullProduct) {
                                const cardHTML = `
                                    <div class="col-md-4 mb-4">
                                        <div class="card recommendation-card h-100 border-0 shadow-sm d-flex flex-column justify-content-between">
                                            <div class="card-body text-center mt-3 p-4">
                                                <span class="badge bg-light text-secondary border mb-2">${fullProduct.category}</span>
                                                <h5 class="card-title fw-bold">${fullProduct.name}</h5>

                                                <h6 class="text-success fw-bold mt-3">₹${fullProduct.price}</h6>
                                            </div>
                                            <div class="card-footer bg-white border-0 text-center pb-4">
                                                <button onclick="window.location.href='product.html?id=${actualId}'" class="btn btn-primary btn-sm w-75">View Details</button>
                                            </div>
                                        </div>
                                    </div>
                                `;
                                recContainer.innerHTML += cardHTML;
                            }
                        });
                    });
            } else {
                recContainer.innerHTML = `<p class="text-muted text-center">No recommendations available.</p>`;
            }
        })
        .catch(error => {
            console.error("Error fetching data:", error);
        });
</script>

</body>
</html>
