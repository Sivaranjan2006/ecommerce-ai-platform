spring.application.name=e-commerce

# Database Connection
# Note: Values default to localhost for local dev.
# Override these with environment variables (DB_URL, DB_USER, DB_PASSWORD) in production.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# Hibernate / JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false